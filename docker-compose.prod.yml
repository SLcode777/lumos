# Lumos — production / end-user install.
#
# Pulls a pre-built image from GHCR (ghcr.io/slcode777/lumos). No source
# clone, no local build. Pair this file with a .env containing the two
# required secrets and run `docker compose up -d`.
#
# Contributors who want to build from source: use docker-compose.yml instead.

services:
  app:
    image: ghcr.io/slcode777/lumos:${LUMOS_TAG:-latest}
    container_name: lumos-app
    restart: unless-stopped
    environment:
      DATABASE_URL: file:/data/lumos.db
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      REGISTRATION_MODE: ${REGISTRATION_MODE:-invite-only}
      INVITATION_TTL_DAYS: ${INVITATION_TTL_DAYS:-7}
    volumes:
      - lumos-data:/data
    ports:
      - "${APP_PORT:-3000}:3000"

  # ────────────────────────────────────────────────────────────────────────────
  # Optional reverse-proxy for HTTPS in front of the app.
  # Uncomment + adjust the email/domain to enable. Requires a public domain
  # pointing to this host (Caddy provisions Let's Encrypt certs automatically).
  # ────────────────────────────────────────────────────────────────────────────
  # caddy:
  #   image: caddy:2-alpine
  #   container_name: lumos-caddy
  #   restart: unless-stopped
  #   depends_on:
  #     - app
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy-data:/data
  #     - caddy-config:/config

volumes:
  lumos-data:
  # caddy-data:
  # caddy-config:
