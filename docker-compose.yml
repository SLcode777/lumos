# docker-compose.yml — for contributors building from source.
# End-users: see docker-compose.prod.yml which pulls the
# pre-built image from GHCR.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lumos-app
    restart: unless-stopped
    environment:
      # SQLite file path inside the container, persisted via the lumos-data volume.
      DATABASE_URL: file:/data/lumos.db
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      REGISTRATION_MODE: ${REGISTRATION_MODE:-invite-only}
      INVITATION_TTL_DAYS: ${INVITATION_TTL_DAYS:-7}
    volumes:
      - lumos-data:/data
    ports:
      - "${APP_PORT:-3000}:3000"
    # Makes `host.docker.internal` resolve to the host's IP from inside the
    # container. Native on Docker Desktop (Mac/Windows); on Linux it requires
    # this explicit mapping. Lets users connect to a Postgres running on the
    # host (e.g. the bundled db-demo container on port 5434) without hard-
    # coding host IPs.
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ────────────────────────────────────────────────────────────────────────────
  # Optional reverse-proxy for HTTPS in front of the app.
  # Uncomment + adjust the email/domain to enable. Requires a public domain
  # pointing to this host (Caddy provisions Let's Encrypt certs automatically).
  # ────────────────────────────────────────────────────────────────────────────
  # caddy:
  #   image: caddy:2-alpine
  #   container_name: lumos-caddy
  #   restart: unless-stopped
  #   depends_on:
  #     - app
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy-data:/data
  #     - caddy-config:/config

volumes:
  lumos-data:
  # caddy-data:
  # caddy-config: